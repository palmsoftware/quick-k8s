name: 'Quick K8s'
description: 'Quickly deploy a k8s cluster on Github Actions hosted runners'
branding:
  icon: 'server'
  color: 'blue'
inputs:
  apiServerPort:
    description: 'The port to use for the Kubernetes API server'
    required: false
    default: '6443'
  apiServerAddress:
    description: 'The address to use for the Kubernetes API server'
    required: false
    default: '0.0.0.0'
  disableDefaultCni:
    description: 'Disable the default CNI plugin'
    required: false
    default: 'true'
  ipFamily:
    description: 'The IP family to use for the Kubernetes API server'
    required: false
    default: 'dual'
  defaultNodeImage:
    description: 'The default node image to use for the Kubernetes cluster'
    required: false
    default: 'kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5'
  numControlPlaneNodes:
    description: 'The number of control plane nodes to use for the Kubernetes cluster'
    required: false
    default: '1'
  numWorkerNodes:
    description: 'The number of worker nodes to use for the Kubernetes cluster'
    required: false
    default: '1'
  clusterName:
    description: 'Name for the Kubernetes cluster'
    required: false
    default: 'kind'
  clusterProvider:
    description: 'Kubernetes cluster provider (kind or minikube)'
    required: false
    default: 'kind'
  kindVersion:
    description: 'The version of KinD to use'
    required: false
    default: 'v0.32.0'
  minikubeVersion:
    description: 'The version of Minikube to use'
    required: false
    default: 'v1.38.1'
  minikubeDriver:
    description: 'The driver to use for Minikube (docker, podman, none)'
    required: false
    default: 'docker'
  calicoVersion:
    description: 'The version of Calico to use'
    required: false
    default: 'v3.32.1'
  ocpReleaseLevel:
    description: 'The release level of OpenShift to use'
    required: false
    default: '4.22'
  installOLM:
    description: 'Install the Operator Lifecycle Manager'
    required: false
    default: 'false'
  olmVersion:
    description: 'The version of OLM to install'
    required: false
    default: 'v0.45.0'
  removeDefaultStorageClass:
    description: 'Remove the default storage class'
    required: false
    default: 'false'
  removeControlPlaneTaint:
    description: 'Remove the control plane taint'
    required: false
    default: 'false'
  waitForPodsReady:
    description: 'Wait for all pods to be ready'
    required: false
    default: 'false'
  waitForPodsNamespaces:
    description: 'Comma-separated list of namespaces to monitor for pod readiness. If empty, monitors all namespaces'
    required: false
    default: ''
  waitForPodsExcludeNamespaces:
    description: 'Comma-separated list of namespaces to exclude from pod readiness monitoring'
    required: false
    default: ''
  waitForPodsTimeout:
    description: 'Timeout in seconds for waiting for pods to be ready (default: 1200 = 20 minutes)'
    required: false
    default: '1200'
  installIstio:
    description: 'Install Istio service mesh'
    required: false
    default: 'false'
  istioVersion:
    description: 'The version of Istio to install'
    required: false
    default: '1.30.2'
  istioProfile:
    description: 'Istio installation profile (minimal, demo, default, preview, ambient, empty)'
    required: false
    default: 'minimal'
  installCertManager:
    description: 'Install cert-manager for TLS certificate management'
    required: false
    default: 'false'
  certManagerVersion:
    description: 'The version of cert-manager to install'
    required: false
    default: 'v1.21.0'
  installIngressNginx:
    description: 'Install NGINX Ingress controller for HTTP/HTTPS routing'
    required: false
    default: 'false'
  ingressNginxVersion:
    description: 'The version of ingress-nginx to install'
    required: false
    default: 'v1.15.1'
  installMetricsServer:
    description: 'Install metrics-server for kubectl top and HPA support'
    required: false
    default: 'false'
  metricsServerVersion:
    description: 'The version of metrics-server to install'
    required: false
    default: 'v0.9.0'
  installMetalLB:
    description: 'Install MetalLB for LoadBalancer service support on local clusters'
    required: false
    default: 'false'
  metalLBVersion:
    description: 'The version of MetalLB to install'
    required: false
    default: 'v0.16.0'
  workerNodeLabels:
    description: 'Comma-separated list of key=value labels to apply to worker nodes (e.g., "node-role.kubernetes.io/worker=worker,env=test")'
    required: false
    default: ''
  controlPlaneTaints:
    description: 'Comma-separated list of taints to apply to control-plane nodes (e.g., "key1=value1:NoSchedule,key2=value2:NoExecute")'
    required: false
    default: ''
  workerNodeTaints:
    description: 'Comma-separated list of taints to apply to worker nodes (e.g., "key1=value1:NoSchedule,key2=value2:NoExecute")'
    required: false
    default: ''
  installOperatorSdk:
    description: 'Install operator-sdk CLI for building and testing Kubernetes operators'
    required: false
    default: 'false'
  operatorSdkVersion:
    description: 'The version of operator-sdk to install'
    required: false
    default: 'v1.42.3'
  enableClusterMonitoring:
    description: 'Enable cluster monitoring stack (Prometheus, Thanos, Alertmanager, Grafana) via kube-prometheus'
    required: false
    default: 'false'
  kubePrometheusVersion:
    description: 'The version of kube-prometheus to install'
    required: false
    default: 'v0.18.0'
  thanosVersion:
    description: 'The version of Thanos to install'
    required: false
    default: 'v0.42.0'
  cniPlugin:
    description: 'CNI plugin to install when default CNI is disabled (calico, cilium, flannel, none). Use none to bring your own CNI'
    required: false
    default: 'calico'
  installCalico:
    description: 'Deprecated: use cniPlugin instead. Install Calico CNI when default CNI is disabled'
    required: false
    default: 'true'
  installSampleNetworkPolicies:
    description: 'Install sample NetworkPolicy resources in the default namespace for testing (default-deny-all, allow-dns, allow-same-namespace)'
    required: false
    default: 'false'
  kindConfigPath:
    description: 'Path to custom KinD configuration file. When provided, uses this instead of auto-generated config'
    required: false
    default: ''
  extraPortMappings:
    description: 'Comma-separated list of host:container port mappings for KinD nodes (e.g., "80:30080,443:30443"). Only applies to KinD provider'
    required: false
    default: ''
  installLocalRegistry:
    description: 'Install a local Docker registry accessible from the cluster'
    required: false
    default: 'false'
  localRegistryPort:
    description: 'Port for the local Docker registry'
    required: false
    default: '5001'
  componentTimeout:
    description: 'Timeout in seconds for component installation (kubectl wait commands)'
    required: false
    default: '300'
  clusterCPUs:
    description: 'Number of CPUs to allocate to the cluster (e.g., 2). Only applies to Minikube provider'
    required: false
    default: '2'
  clusterMemory:
    description: 'Memory in MB to allocate to the cluster (e.g., 4096). Empty means use provider default. Only applies to Minikube provider'
    required: false
    default: ''
  dryRun:
    description: 'Preview what the action would do without executing. Prints configuration summary and exits'
    required: false
    default: 'false'
  createPersistentVolumes:
    description: 'Create sample PersistentVolumes using hostPath for testing'
    required: false
    default: 'false'
  persistentVolumeCount:
    description: 'Number of PersistentVolumes to create'
    required: false
    default: '5'
  persistentVolumeSize:
    description: 'Size of each PersistentVolume (e.g., 10Gi, 1Gi, 500Mi)'
    required: false
    default: '10Gi'
  skipDiskCleanup:
    description: 'Skip disk cleanup steps. Useful for self-hosted runners with ample disk space'
    required: false
    default: 'false'
  enableCleanup:
    description: 'Generate a cleanup script at /tmp/quick-k8s-cleanup.sh for post-run cluster teardown'
    required: false
    default: 'false'
  flannelVersion:
    description: 'The version of Flannel CNI to install (when cniPlugin is flannel)'
    required: false
    default: 'v0.28.7'

runs:
  using: 'composite'
  steps:
    - name: Validate cluster provider input
      shell: bash
      env:
        CLUSTER_PROVIDER: ${{ inputs.clusterProvider }}
      run: |
        if [[ "$CLUSTER_PROVIDER" != "kind" && "$CLUSTER_PROVIDER" != "minikube" ]]; then
          echo "Invalid cluster provider: $CLUSTER_PROVIDER"
          echo "Must be 'kind' or 'minikube'"
          exit 1
        fi

    - name: Validate IP family input
      shell: bash
      env:
        IP_FAMILY: ${{ inputs.ipFamily }}
      run: |
        if [[ "$IP_FAMILY" != "dual" && "$IP_FAMILY" != "ipv4" && "$IP_FAMILY" != "ipv6" ]]; then
          echo "Invalid IP family: $IP_FAMILY"
          echo "Must be 'dual', 'ipv4', or 'ipv6'"
          exit 1
        fi

    - name: Warn about ipFamily support for non-KinD providers
      if: ${{ inputs.clusterProvider != 'kind' && inputs.ipFamily != 'ipv4' }}
      shell: bash
      env:
        IP_FAMILY: ${{ inputs.ipFamily }}
        CLUSTER_PROVIDER: ${{ inputs.clusterProvider }}
      run: |
        echo "::warning::ipFamily '$IP_FAMILY' is only fully supported with KinD. $CLUSTER_PROVIDER will use default networking (ipv4)."

    - name: Validate apiServerPort input
      shell: bash
      env:
        API_SERVER_PORT: ${{ inputs.apiServerPort }}
      run: |
        PORT="$API_SERVER_PORT"
        if ! [[ "$PORT" =~ ^[0-9]+$ ]] || [ "$PORT" -lt 1024 ] || [ "$PORT" -gt 65535 ]; then
          echo "Invalid apiServerPort: $PORT"
          echo "Must be a number between 1024 and 65535"
          exit 1
        fi

    - name: Validate API server address input
      shell: bash
      env:
        API_SERVER_ADDRESS: ${{ inputs.apiServerAddress }}
      run: |
        ADDR="$API_SERVER_ADDRESS"
        # IPv4: exactly 4 decimal octets 0-255
        if [[ "$ADDR" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
          IFS='.' read -ra OCTETS <<< "$ADDR"
          VALID=true
          for octet in "${OCTETS[@]}"; do
            if [ "$octet" -gt 255 ]; then
              VALID=false
              break
            fi
          done
          if [ "$VALID" = "true" ]; then
            exit 0
          fi
        # IPv6: colons and hex digits, at least one colon
        elif [[ "$ADDR" =~ ^[0-9a-fA-F:]+$ ]] && [[ "$ADDR" == *:* ]]; then
          exit 0
        fi
        echo "::error::Invalid API server address: $ADDR"
        echo "Must be a valid IPv4 or IPv6 address"
        exit 1

    - name: Validate KinD version input
      if: ${{ inputs.clusterProvider == 'kind' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        KIND_VERSION: ${{ inputs.kindVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "KinD" "kubernetes-sigs/kind" "$KIND_VERSION"

    - name: Validate Minikube version input
      if: ${{ inputs.clusterProvider == 'minikube' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MINIKUBE_VERSION: ${{ inputs.minikubeVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "Minikube" "kubernetes/minikube" "$MINIKUBE_VERSION"

    - name: Validate minikubeDriver input
      if: ${{ inputs.clusterProvider == 'minikube' }}
      shell: bash
      env:
        MINIKUBE_DRIVER: ${{ inputs.minikubeDriver }}
      run: |
        DRIVER="$MINIKUBE_DRIVER"
        if [[ "$DRIVER" != "docker" && "$DRIVER" != "podman" && "$DRIVER" != "none" ]]; then
          echo "Invalid minikubeDriver: $DRIVER"
          echo "Must be 'docker', 'podman', or 'none'"
          exit 1
        fi

    - name: Validate Calico version input
      if: ${{ inputs.disableDefaultCni == 'true' && inputs.cniPlugin == 'calico' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        CALICO_VERSION: ${{ inputs.calicoVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "Calico" "projectcalico/calico" "$CALICO_VERSION"

    - name: Validate OpenShift release level input
      shell: bash
      env:
        OCP_RELEASE_LEVEL: ${{ inputs.ocpReleaseLevel }}
      run: |
        if ! [[ "$OCP_RELEASE_LEVEL" =~ ^[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid OpenShift release level format: $OCP_RELEASE_LEVEL"
          exit 1
        fi

    - name: Validate Istio version input
      if: ${{ inputs.installIstio == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        ISTIO_VERSION: ${{ inputs.istioVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "Istio" "istio/istio" "$ISTIO_VERSION"

    - name: Validate Istio profile input
      if: ${{ inputs.installIstio == 'true' }}
      shell: bash
      env:
        ISTIO_PROFILE: ${{ inputs.istioProfile }}
      run: |
        VALID_PROFILES=("minimal" "demo" "default" "preview" "ambient" "empty")
        PROFILE="$ISTIO_PROFILE"
        if [[ ! " ${VALID_PROFILES[@]} " =~ " ${PROFILE} " ]]; then
          echo "Invalid Istio profile: $PROFILE"
          echo "Valid profiles are: ${VALID_PROFILES[*]}"
          exit 1
        fi

    - name: Validate disableDefaultCni input
      shell: bash
      env:
        DISABLE_DEFAULT_CNI: ${{ inputs.disableDefaultCni }}
      run: |
        if [[ "$DISABLE_DEFAULT_CNI" != "true" && "$DISABLE_DEFAULT_CNI" != "false" ]]; then
          echo "Invalid disableDefaultCni value: $DISABLE_DEFAULT_CNI"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate installOLM input
      shell: bash
      env:
        INSTALL_OLM: ${{ inputs.installOLM }}
      run: |
        if [[ "$INSTALL_OLM" != "true" && "$INSTALL_OLM" != "false" ]]; then
          echo "Invalid installOLM value: $INSTALL_OLM"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate OLM version input
      if: ${{ inputs.installOLM == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "OLM" "operator-framework/operator-lifecycle-manager" "${{ inputs.olmVersion }}"

    - name: Validate installIstio input
      shell: bash
      env:
        INSTALL_ISTIO: ${{ inputs.installIstio }}
      run: |
        if [[ "$INSTALL_ISTIO" != "true" && "$INSTALL_ISTIO" != "false" ]]; then
          echo "Invalid installIstio value: $INSTALL_ISTIO"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate removeDefaultStorageClass input
      shell: bash
      env:
        REMOVE_DEFAULT_STORAGE_CLASS: ${{ inputs.removeDefaultStorageClass }}
      run: |
        if [[ "$REMOVE_DEFAULT_STORAGE_CLASS" != "true" && "$REMOVE_DEFAULT_STORAGE_CLASS" != "false" ]]; then
          echo "Invalid removeDefaultStorageClass value: $REMOVE_DEFAULT_STORAGE_CLASS"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate removeControlPlaneTaint input
      shell: bash
      env:
        REMOVE_CONTROL_PLANE_TAINT: ${{ inputs.removeControlPlaneTaint }}
      run: |
        if [[ "$REMOVE_CONTROL_PLANE_TAINT" != "true" && "$REMOVE_CONTROL_PLANE_TAINT" != "false" ]]; then
          echo "Invalid removeControlPlaneTaint value: $REMOVE_CONTROL_PLANE_TAINT"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate waitForPodsReady input
      shell: bash
      env:
        WAIT_FOR_PODS_READY: ${{ inputs.waitForPodsReady }}
      run: |
        if [[ "$WAIT_FOR_PODS_READY" != "true" && "$WAIT_FOR_PODS_READY" != "false" ]]; then
          echo "Invalid waitForPodsReady value: $WAIT_FOR_PODS_READY"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate waitForPodsTimeout input
      shell: bash
      run: |
        TIMEOUT="${{ inputs.waitForPodsTimeout }}"
        if ! [[ "$TIMEOUT" =~ ^[0-9]+$ ]] || [ "$TIMEOUT" -lt 60 ] || [ "$TIMEOUT" -gt 7200 ]; then
          echo "Invalid waitForPodsTimeout: $TIMEOUT"
          echo "Must be a number between 60 and 7200 (1 minute to 2 hours)"
          exit 1
        fi

    - name: Validate installCertManager input
      shell: bash
      env:
        INSTALL_CERT_MANAGER: ${{ inputs.installCertManager }}
      run: |
        if [[ "$INSTALL_CERT_MANAGER" != "true" && "$INSTALL_CERT_MANAGER" != "false" ]]; then
          echo "Invalid installCertManager value: $INSTALL_CERT_MANAGER"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate cert-manager version input
      if: ${{ inputs.installCertManager == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        CERT_MANAGER_VERSION: ${{ inputs.certManagerVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "cert-manager" "cert-manager/cert-manager" "$CERT_MANAGER_VERSION"

    - name: Validate installIngressNginx input
      shell: bash
      env:
        INSTALL_INGRESS_NGINX: ${{ inputs.installIngressNginx }}
      run: |
        if [[ "$INSTALL_INGRESS_NGINX" != "true" && "$INSTALL_INGRESS_NGINX" != "false" ]]; then
          echo "Invalid installIngressNginx value: $INSTALL_INGRESS_NGINX"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate ingress-nginx version input
      if: ${{ inputs.installIngressNginx == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INGRESS_NGINX_VERSION: ${{ inputs.ingressNginxVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "ingress-nginx" "kubernetes/ingress-nginx" "$INGRESS_NGINX_VERSION" "controller-"

    - name: Validate installMetricsServer input
      shell: bash
      env:
        INSTALL_METRICS_SERVER: ${{ inputs.installMetricsServer }}
      run: |
        if [[ "$INSTALL_METRICS_SERVER" != "true" && "$INSTALL_METRICS_SERVER" != "false" ]]; then
          echo "Invalid installMetricsServer value: $INSTALL_METRICS_SERVER"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate metrics-server version input
      if: ${{ inputs.installMetricsServer == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        METRICS_SERVER_VERSION: ${{ inputs.metricsServerVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "metrics-server" "kubernetes-sigs/metrics-server" "$METRICS_SERVER_VERSION"

    - name: Validate installMetalLB input
      shell: bash
      run: |
        if [[ "${{ inputs.installMetalLB }}" != "true" && "${{ inputs.installMetalLB }}" != "false" ]]; then
          echo "Invalid installMetalLB value: ${{ inputs.installMetalLB }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate MetalLB version input
      if: ${{ inputs.installMetalLB == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "MetalLB" "metallb/metallb" "${{ inputs.metalLBVersion }}"

    - name: Validate installOperatorSdk input
      shell: bash
      env:
        INSTALL_OPERATOR_SDK: ${{ inputs.installOperatorSdk }}
      run: |
        if [[ "$INSTALL_OPERATOR_SDK" != "true" && "$INSTALL_OPERATOR_SDK" != "false" ]]; then
          echo "Invalid installOperatorSdk value: $INSTALL_OPERATOR_SDK"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate operator-sdk version input
      if: ${{ inputs.installOperatorSdk == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        OPERATOR_SDK_VERSION: ${{ inputs.operatorSdkVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "operator-sdk" "operator-framework/operator-sdk" "$OPERATOR_SDK_VERSION"

    - name: Validate enableClusterMonitoring input
      shell: bash
      env:
        ENABLE_CLUSTER_MONITORING: ${{ inputs.enableClusterMonitoring }}
      run: |
        if [[ "$ENABLE_CLUSTER_MONITORING" != "true" && "$ENABLE_CLUSTER_MONITORING" != "false" ]]; then
          echo "Invalid enableClusterMonitoring value: $ENABLE_CLUSTER_MONITORING"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate kube-prometheus version input
      if: ${{ inputs.enableClusterMonitoring == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        KUBE_PROMETHEUS_VERSION: ${{ inputs.kubePrometheusVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "kube-prometheus" "prometheus-operator/kube-prometheus" "$KUBE_PROMETHEUS_VERSION"

    - name: Validate Thanos version input
      if: ${{ inputs.enableClusterMonitoring == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        THANOS_VERSION: ${{ inputs.thanosVersion }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "Thanos" "thanos-io/thanos" "$THANOS_VERSION"

    - name: Validate installCalico input
      shell: bash
      env:
        INSTALL_CALICO: ${{ inputs.installCalico }}
      run: |
        if [[ "$INSTALL_CALICO" != "true" && "$INSTALL_CALICO" != "false" ]]; then
          echo "Invalid installCalico value: $INSTALL_CALICO"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate installSampleNetworkPolicies input
      shell: bash
      run: |
        if [[ "${{ inputs.installSampleNetworkPolicies }}" != "true" && "${{ inputs.installSampleNetworkPolicies }}" != "false" ]]; then
          echo "Invalid installSampleNetworkPolicies value: ${{ inputs.installSampleNetworkPolicies }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate cniPlugin input
      shell: bash
      run: |
        CNI="${{ inputs.cniPlugin }}"
        if [[ "$CNI" != "calico" && "$CNI" != "cilium" && "$CNI" != "flannel" && "$CNI" != "none" ]]; then
          echo "Invalid cniPlugin value: $CNI"
          echo "Must be 'calico', 'cilium', 'flannel', or 'none'"
          exit 1
        fi

    - name: Validate Flannel version input
      if: ${{ inputs.disableDefaultCni == 'true' && inputs.cniPlugin == 'flannel' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "Flannel" "flannel-io/flannel" "${{ inputs.flannelVersion }}"

    - name: Validate installLocalRegistry input
      shell: bash
      env:
        INSTALL_LOCAL_REGISTRY: ${{ inputs.installLocalRegistry }}
      run: |
        if [[ "$INSTALL_LOCAL_REGISTRY" != "true" && "$INSTALL_LOCAL_REGISTRY" != "false" ]]; then
          echo "Invalid installLocalRegistry value: $INSTALL_LOCAL_REGISTRY"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate enableCleanup input
      shell: bash
      env:
        ENABLE_CLEANUP: ${{ inputs.enableCleanup }}
      run: |
        if [[ "$ENABLE_CLEANUP" != "true" && "$ENABLE_CLEANUP" != "false" ]]; then
          echo "Invalid enableCleanup value: $ENABLE_CLEANUP"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate skipDiskCleanup input
      shell: bash
      env:
        SKIP_DISK_CLEANUP: ${{ inputs.skipDiskCleanup }}
      run: |
        if [[ "$SKIP_DISK_CLEANUP" != "true" && "$SKIP_DISK_CLEANUP" != "false" ]]; then
          echo "Invalid skipDiskCleanup value: $SKIP_DISK_CLEANUP"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate dryRun input
      shell: bash
      env:
        DRY_RUN: ${{ inputs.dryRun }}
      run: |
        if [[ "$DRY_RUN" != "true" && "$DRY_RUN" != "false" ]]; then
          echo "Invalid dryRun value: $DRY_RUN"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate createPersistentVolumes input
      shell: bash
      run: |
        if [[ "${{ inputs.createPersistentVolumes }}" != "true" && "${{ inputs.createPersistentVolumes }}" != "false" ]]; then
          echo "Invalid createPersistentVolumes value: ${{ inputs.createPersistentVolumes }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate persistentVolumeCount input
      if: ${{ inputs.createPersistentVolumes == 'true' }}
      shell: bash
      run: |
        COUNT="${{ inputs.persistentVolumeCount }}"
        if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ] || [ "$COUNT" -gt 100 ]; then
          echo "Invalid persistentVolumeCount: $COUNT"
          echo "Must be a number between 1 and 100"
          exit 1
        fi

    - name: Validate persistentVolumeSize input
      if: ${{ inputs.createPersistentVolumes == 'true' }}
      shell: bash
      run: |
        SIZE="${{ inputs.persistentVolumeSize }}"
        if ! [[ "$SIZE" =~ ^[0-9]+(Ki|Mi|Gi|Ti|Pi|Ei)?$ ]]; then
          echo "Invalid persistentVolumeSize: $SIZE"
          echo "Must be a valid Kubernetes quantity (e.g., 10Gi, 1Gi, 500Mi)"
          exit 1
        fi

    - name: Validate localRegistryPort input
      if: ${{ inputs.installLocalRegistry == 'true' }}
      shell: bash
      env:
        LOCAL_REGISTRY_PORT: ${{ inputs.localRegistryPort }}
      run: |
        PORT="$LOCAL_REGISTRY_PORT"
        if ! [[ "$PORT" =~ ^[0-9]+$ ]] || [ "$PORT" -lt 1024 ] || [ "$PORT" -gt 65535 ]; then
          echo "Invalid localRegistryPort: $PORT"
          echo "Must be a number between 1024 and 65535"
          exit 1
        fi

    - name: Validate componentTimeout input
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
      run: |
        TIMEOUT="$COMPONENT_TIMEOUT"
        if ! [[ "$TIMEOUT" =~ ^[0-9]+$ ]] || [ "$TIMEOUT" -lt 1 ]; then
          echo "Invalid componentTimeout: $TIMEOUT"
          echo "Must be a positive integer (seconds)"
          exit 1
        fi

    - name: Validate clusterCPUs input
      shell: bash
      run: |
        CPUS="${{ inputs.clusterCPUs }}"
        if ! [[ "$CPUS" =~ ^[0-9]+$ ]] || [ "$CPUS" -lt 1 ]; then
          echo "Invalid clusterCPUs: $CPUS"
          echo "Must be a positive integer"
          exit 1
        fi

    - name: Validate clusterMemory input
      if: ${{ inputs.clusterMemory != '' }}
      shell: bash
      run: |
        MEMORY="${{ inputs.clusterMemory }}"
        if ! [[ "$MEMORY" =~ ^[0-9]+$ ]] || [ "$MEMORY" -lt 1 ]; then
          echo "Invalid clusterMemory: $MEMORY"
          echo "Must be a positive integer (MB)"
          exit 1
        fi

    - name: Notice about resource limits for KinD provider
      if: ${{ inputs.clusterProvider == 'kind' && (inputs.clusterCPUs != '2' || inputs.clusterMemory != '') }}
      shell: bash
      run: |
        echo "::notice::KinD runs as Docker containers. CPU and memory limits are controlled by the Docker daemon configuration, not by clusterCPUs/clusterMemory inputs."

    - name: Validate kindConfigPath input
      if: ${{ inputs.kindConfigPath != '' && inputs.clusterProvider == 'kind' }}
      shell: bash
      env:
        KIND_CONFIG_PATH: ${{ inputs.kindConfigPath }}
      run: |
        CONFIG_PATH="$KIND_CONFIG_PATH"
        if [ ! -f "$CONFIG_PATH" ]; then
          echo "Custom KinD config file not found: $CONFIG_PATH"
          exit 1
        fi
        echo "Using custom KinD configuration from: $CONFIG_PATH"

    - name: Validate number of control-plane nodes
      shell: bash
      env:
        NUM_CONTROL_PLANE_NODES: ${{ inputs.numControlPlaneNodes }}
      run: |
        if [[ "$NUM_CONTROL_PLANE_NODES" -lt 1 ]]; then
          echo "The number of control-plane nodes cannot be less than 1."
          exit 1
        fi

    - name: Warn about Minikube multi-control-plane limitation
      if: ${{ inputs.clusterProvider == 'minikube' && inputs.numControlPlaneNodes > 1 }}
      shell: bash
      run: |
        echo "::warning::Minikube does not support true multi-control-plane HA. Setting numControlPlaneNodes > 1 creates additional generic nodes, not actual control planes."

    - name: Validate number of worker nodes
      shell: bash
      env:
        NUM_WORKER_NODES: ${{ inputs.numWorkerNodes }}
      run: |
        if [[ "$NUM_WORKER_NODES" -lt 0 ]]; then
          echo "The number of worker nodes cannot be negative."
          exit 1
        fi

    - name: Dry-run summary
      if: ${{ inputs.dryRun == 'true' }}
      shell: bash
      env:
        CLUSTER_PROVIDER: ${{ inputs.clusterProvider }}
        DEFAULT_NODE_IMAGE: ${{ inputs.defaultNodeImage }}
        API_SERVER_PORT: ${{ inputs.apiServerPort }}
        API_SERVER_ADDRESS: ${{ inputs.apiServerAddress }}
        IP_FAMILY: ${{ inputs.ipFamily }}
        NUM_CONTROL_PLANE_NODES: ${{ inputs.numControlPlaneNodes }}
        NUM_WORKER_NODES: ${{ inputs.numWorkerNodes }}
        DISABLE_DEFAULT_CNI: ${{ inputs.disableDefaultCni }}
        INSTALL_CALICO: ${{ inputs.installCalico }}
        INSTALL_OLM: ${{ inputs.installOLM }}
        INSTALL_ISTIO: ${{ inputs.installIstio }}
        ISTIO_PROFILE: ${{ inputs.istioProfile }}
        INSTALL_CERT_MANAGER: ${{ inputs.installCertManager }}
        INSTALL_INGRESS_NGINX: ${{ inputs.installIngressNginx }}
        INSTALL_METRICS_SERVER: ${{ inputs.installMetricsServer }}
        INSTALL_LOCAL_REGISTRY: ${{ inputs.installLocalRegistry }}
        LOCAL_REGISTRY_PORT: ${{ inputs.localRegistryPort }}
        ENABLE_CLUSTER_MONITORING: ${{ inputs.enableClusterMonitoring }}
        INSTALL_SAMPLE_NETWORK_POLICIES: ${{ inputs.installSampleNetworkPolicies }}
        WAIT_FOR_PODS_READY: ${{ inputs.waitForPodsReady }}
        REMOVE_DEFAULT_STORAGE_CLASS: ${{ inputs.removeDefaultStorageClass }}
        REMOVE_CONTROL_PLANE_TAINT: ${{ inputs.removeControlPlaneTaint }}
        KIND_VERSION: ${{ inputs.kindVersion }}
        KIND_CONFIG_PATH: ${{ inputs.kindConfigPath }}
        MINIKUBE_VERSION: ${{ inputs.minikubeVersion }}
        MINIKUBE_DRIVER: ${{ inputs.minikubeDriver }}
      run: |
        echo "=============================================="
        echo "  quick-k8s Dry Run Summary"
        echo "=============================================="
        echo ""
        echo "Cluster Provider: $CLUSTER_PROVIDER"
        echo "Node Image: $DEFAULT_NODE_IMAGE"
        echo "API Server Port: $API_SERVER_PORT"
        echo "API Server Address: $API_SERVER_ADDRESS"
        echo "IP Family: $IP_FAMILY"
        echo "Control-Plane Nodes: $NUM_CONTROL_PLANE_NODES"
        echo "Worker Nodes: $NUM_WORKER_NODES"
        echo ""
        echo "Components to install:"
        echo "  Calico CNI: $([ "$DISABLE_DEFAULT_CNI" = "true" ] && [ "$INSTALL_CALICO" = "true" ] && echo "true" || echo "false")"
        echo "  OLM: $INSTALL_OLM"
        echo "  Istio: $INSTALL_ISTIO (profile: $ISTIO_PROFILE)"
        echo "  Cert-Manager: $INSTALL_CERT_MANAGER"
        echo "  Ingress-Nginx: $INSTALL_INGRESS_NGINX"
        echo "  Metrics Server: $INSTALL_METRICS_SERVER"
        echo "  Local Registry: $INSTALL_LOCAL_REGISTRY (port: $LOCAL_REGISTRY_PORT)"
        echo "  Cluster Monitoring: $ENABLE_CLUSTER_MONITORING"
        echo "  Sample Network Policies: $INSTALL_SAMPLE_NETWORK_POLICIES"
        echo ""
        echo "Options:"
        echo "  Disable Default CNI: $DISABLE_DEFAULT_CNI"
        echo "  Remove Default StorageClass: $REMOVE_DEFAULT_STORAGE_CLASS"
        echo "  Remove Control-Plane Taint: $REMOVE_CONTROL_PLANE_TAINT"
        echo "  Wait for Pods Ready: $WAIT_FOR_PODS_READY"
        echo ""
        if [ "$CLUSTER_PROVIDER" = "kind" ]; then
          echo "KinD Settings:"
          echo "  KinD Version: $KIND_VERSION"
          if [ -n "$KIND_CONFIG_PATH" ]; then
            echo "  Custom Config: $KIND_CONFIG_PATH"
          else
            echo "  Custom Config: auto-generated"
          fi
        elif [ "$CLUSTER_PROVIDER" = "minikube" ]; then
          echo "Minikube Settings:"
          echo "  Minikube Version: $MINIKUBE_VERSION"
          echo "  Driver: $MINIKUBE_DRIVER"
        fi
        if [ -n "$EXTRA_PROVIDER_ARGS" ]; then
          echo ""
          echo "Extra Provider Args: $EXTRA_PROVIDER_ARGS"
        fi
        echo ""
        echo "=============================================="
        echo "  Dry run complete - no changes were made"
        echo "=============================================="

    - name: Initialize timing metrics
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      run: |
        # shellcheck source=scripts/log-timing.sh
        source "${{ github.action_path }}/scripts/log-timing.sh"
        init_timing

    - name: Check GitHub service status
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/check-github-status.sh

    - name: Write temporary docker file
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      run: |
        mkdir -p /home/runner/.docker
        touch /home/runner/.docker/config

    - name: Pre-flight environment check
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      env:
        API_SERVER_PORT: ${{ inputs.apiServerPort }}
      run: ${{ github.action_path }}/scripts/pre-flight-check.sh

    - name: Optimize disk space and relocate Docker storage
      if: ${{ inputs.dryRun != 'true' && inputs.skipDiskCleanup != 'true' }}
      uses: palmsoftware/quick-cleanup@v0
      with:
        cleanup-mode: auto
        minimum-free-space: 8

    # Cache KinD binary to avoid download failures during outages
    - name: Cache KinD binary
      if: ${{ inputs.clusterProvider == 'kind' && inputs.dryRun != 'true' }}
      id: cache-kind
      uses: actions/cache@v6
      with:
        path: /tmp/kind-binary
        key: kind-${{ inputs.kindVersion }}-${{ runner.os }}-${{ runner.arch }}

    # Install KinD binary (unified script for all platforms)
    - name: Install KinD
      if: ${{ inputs.clusterProvider == 'kind' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        KIND_VERSION: ${{ inputs.kindVersion }}
      run: |
        OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
        ${{ github.action_path }}/scripts/install-kind.sh "$KIND_VERSION" "$OS" ${{ runner.arch }}

    - name: Add error handling for KinD installation
      if: ${{ inputs.clusterProvider == 'kind' && inputs.dryRun != 'true' }}
      shell: bash
      run: |
        if ! command -v kind &> /dev/null; then
          echo "KinD installation failed. Exiting."
          exit 1
        fi

    # Cache Minikube binary to avoid download failures during outages
    - name: Cache Minikube binary
      if: ${{ inputs.clusterProvider == 'minikube' && inputs.dryRun != 'true' }}
      id: cache-minikube
      uses: actions/cache@v6
      with:
        path: /tmp/minikube-binary
        key: minikube-${{ inputs.minikubeVersion }}-${{ runner.os }}-${{ runner.arch }}

    # Install Minikube binary (unified script for all platforms)
    - name: Install Minikube
      if: ${{ inputs.clusterProvider == 'minikube' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        MINIKUBE_VERSION: ${{ inputs.minikubeVersion }}
      run: |
        OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
        ${{ github.action_path }}/scripts/install-minikube.sh "$MINIKUBE_VERSION" "$OS" ${{ runner.arch }}

    - name: Add error handling for Minikube installation
      if: ${{ inputs.clusterProvider == 'minikube' && inputs.dryRun != 'true' }}
      shell: bash
      run: |
        if ! command -v minikube &> /dev/null; then
          echo "Minikube installation failed. Exiting."
          exit 1
        fi

    # Create a new Kubernetes cluster using KinD
    - name: Populate temporary config file for KinD (auto-generated)
      if: ${{ inputs.clusterProvider == 'kind' && inputs.kindConfigPath == '' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        EXTRA_PORT_MAPPINGS: ${{ inputs.extraPortMappings }}
        API_SERVER_PORT: ${{ inputs.apiServerPort }}
        API_SERVER_ADDRESS: ${{ inputs.apiServerAddress }}
        DISABLE_DEFAULT_CNI: ${{ inputs.disableDefaultCni }}
        IP_FAMILY: ${{ inputs.ipFamily }}
        DEFAULT_NODE_IMAGE: ${{ inputs.defaultNodeImage }}
        NUM_CONTROL_PLANE_NODES: ${{ inputs.numControlPlaneNodes }}
        NUM_WORKER_NODES: ${{ inputs.numWorkerNodes }}
        CLUSTER_NAME: ${{ inputs.clusterName }}
      run: ${{ github.action_path }}/scripts/generate-kind-config.sh "$API_SERVER_PORT" "$API_SERVER_ADDRESS" "$DISABLE_DEFAULT_CNI" "$IP_FAMILY" "$DEFAULT_NODE_IMAGE" "$NUM_CONTROL_PLANE_NODES" "$NUM_WORKER_NODES" ${{ github.action_path }}/kind-config.yaml "$CLUSTER_NAME"

    - name: Use custom KinD config file
      if: ${{ inputs.clusterProvider == 'kind' && inputs.kindConfigPath != '' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        KIND_CONFIG_PATH: ${{ inputs.kindConfigPath }}
      run: |
        echo "Using custom KinD configuration from: $KIND_CONFIG_PATH"
        cp "$KIND_CONFIG_PATH" "${{ github.action_path }}/kind-config.yaml"

    - name: Print the KinD config
      if: ${{ inputs.clusterProvider == 'kind' && inputs.dryRun != 'true' }}
      shell: bash
      run: cat ${{ github.action_path }}/kind-config.yaml

    - name: Configure Docker for Kubernetes
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/bootstrap-docker.sh

    - name: Final pre-cluster disk optimization
      if: ${{ inputs.dryRun != 'true' && inputs.skipDiskCleanup != 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/pre-cluster-optimization.sh

    - name: Pre-pull Kind node image with retry
      if: ${{ inputs.clusterProvider == 'kind' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        DEFAULT_NODE_IMAGE: ${{ inputs.defaultNodeImage }}
      run: ${{ github.action_path }}/scripts/pull-kind-image.sh "$DEFAULT_NODE_IMAGE"

    - name: Create a new Kubernetes cluster using KinD
      if: ${{ inputs.clusterProvider == 'kind' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        CLUSTER_NAME: ${{ inputs.clusterName }}
      run: |
        # shellcheck source=scripts/log-timing.sh
        source "${{ github.action_path }}/scripts/log-timing.sh"
        start_timer "Cluster creation (KinD)"

        max_attempts=3
        delay=10
        attempt=1

        # Build the base kind create command
        KIND_CMD="kind create cluster --name ${{ inputs.clusterName }} --config ${{ github.action_path }}/kind-config.yaml"
        if [ -n "$EXTRA_PROVIDER_ARGS" ]; then
          echo "Appending extra provider args: $EXTRA_PROVIDER_ARGS"
          KIND_CMD="$KIND_CMD $EXTRA_PROVIDER_ARGS"
        fi

        while [ $attempt -le $max_attempts ]; do
          echo ""
          echo "Attempt $attempt/$max_attempts: Creating KinD cluster '$CLUSTER_NAME'..."

          set +e
          if command -v timeout >/dev/null 2>&1; then
            timeout 600 kind create cluster --name "$CLUSTER_NAME" --config ${{ github.action_path }}/kind-config.yaml
          else
            kind create cluster --name "$CLUSTER_NAME" --config ${{ github.action_path }}/kind-config.yaml
          fi
          exit_code=$?
          set -e

          if [ $exit_code -eq 0 ]; then
            echo ""
            echo "Successfully created KinD cluster"
            break
          fi

          if [ $attempt -eq $max_attempts ]; then
            echo ""
            echo "Failed to create KinD cluster after $max_attempts attempts (exit code: $exit_code)"
            exit 1
          fi

          echo ""
          echo "Cluster creation failed (exit code: $exit_code), cleaning up before retry..."
          kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true
          echo "Retrying in ${delay}s..."
          sleep $delay
          attempt=$((attempt + 1))
          delay=$((delay * 2))
        done

        end_timer "Cluster creation (KinD)"

    - name: Create a new Kubernetes cluster using Minikube
      if: ${{ inputs.clusterProvider == 'minikube' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        DEFAULT_NODE_IMAGE: ${{ inputs.defaultNodeImage }}
        DISABLE_DEFAULT_CNI: ${{ inputs.disableDefaultCni }}
        MINIKUBE_DRIVER: ${{ inputs.minikubeDriver }}
        API_SERVER_PORT: ${{ inputs.apiServerPort }}
        NUM_CONTROL_PLANE_NODES: ${{ inputs.numControlPlaneNodes }}
        NUM_WORKER_NODES: ${{ inputs.numWorkerNodes }}
        API_SERVER_ADDRESS: ${{ inputs.apiServerAddress }}
        CLUSTER_NAME: ${{ inputs.clusterName }}
        CLUSTER_CPUS: ${{ inputs.clusterCPUs }}
        CLUSTER_MEMORY: ${{ inputs.clusterMemory }}
      run: |
        # shellcheck source=scripts/log-timing.sh
        source "${{ github.action_path }}/scripts/log-timing.sh"
        start_timer "Cluster creation (Minikube)"

        ${{ github.action_path }}/scripts/start-minikube.sh \
          "$DEFAULT_NODE_IMAGE" \
          "$DISABLE_DEFAULT_CNI" \
          "$MINIKUBE_DRIVER" \
          "$API_SERVER_PORT" \
          "$NUM_CONTROL_PLANE_NODES" \
          "$NUM_WORKER_NODES" \
          "$API_SERVER_ADDRESS" \
          "$CLUSTER_NAME" \
          "$CLUSTER_CPUS" \
          "$CLUSTER_MEMORY"

        end_timer "Cluster creation (Minikube)"

    - name: Bootstrap the runner with kubectl client
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      env:
        OCP_RELEASE_LEVEL: ${{ inputs.ocpReleaseLevel }}
      run: |
        sudo ${{ github.action_path }}/scripts/install-oc-tools.sh --latest "$OCP_RELEASE_LEVEL"

    - name: Apply labels to worker nodes
      if: ${{ inputs.workerNodeLabels != '' && inputs.numWorkerNodes > 0 && inputs.dryRun != 'true' }}
      shell: bash
      env:
        NUM_WORKER_NODES: ${{ inputs.numWorkerNodes }}
        WORKER_NODE_LABELS: ${{ inputs.workerNodeLabels }}
      run: ${{ github.action_path }}/scripts/label-worker-nodes.sh "$NUM_WORKER_NODES" "$WORKER_NODE_LABELS"

    - name: Apply custom taints to control-plane nodes
      if: ${{ inputs.controlPlaneTaints != '' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        CONTROL_PLANE_TAINTS: ${{ inputs.controlPlaneTaints }}
      run: |
        IFS=',' read -ra TAINTS <<< "$CONTROL_PLANE_TAINTS"
        for node in $(kubectl get nodes --selector='node-role.kubernetes.io/control-plane' -o jsonpath='{.items[*].metadata.name}'); do
          for taint in "${TAINTS[@]}"; do
            echo "Applying taint $taint to control-plane node $node"
            kubectl taint nodes "$node" "$taint" --overwrite
          done
        done

    - name: Apply custom taints to worker nodes
      if: ${{ inputs.workerNodeTaints != '' && inputs.numWorkerNodes != '0' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        WORKER_NODE_TAINTS: ${{ inputs.workerNodeTaints }}
      run: |
        IFS=',' read -ra TAINTS <<< "$WORKER_NODE_TAINTS"
        for node in $(kubectl get nodes --selector='!node-role.kubernetes.io/control-plane' -o jsonpath='{.items[*].metadata.name}'); do
          for taint in "${TAINTS[@]}"; do
            echo "Applying taint $taint to worker node $node"
            kubectl taint nodes "$node" "$taint" --overwrite
          done
        done

    - name: Cluster health check
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      env:
        DISABLE_DEFAULT_CNI: ${{ inputs.disableDefaultCni }}
      run: ${{ github.action_path }}/scripts/cluster-health-check.sh

    - name: Install calico CNI if default CNI is disabled and installCalico is true
      if: ${{ inputs.disableDefaultCni == 'true' && inputs.installCalico == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
        CALICO_VERSION: ${{ inputs.calicoVersion }}
      run: ${{ github.action_path }}/scripts/install-calico.sh "$CALICO_VERSION"

    - name: Install Cilium CNI
      if: ${{ inputs.disableDefaultCni == 'true' && inputs.cniPlugin == 'cilium' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
      run: ${{ github.action_path }}/scripts/install-cilium.sh

    - name: Install Flannel CNI
      if: ${{ inputs.disableDefaultCni == 'true' && inputs.cniPlugin == 'flannel' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
      run: ${{ github.action_path }}/scripts/install-flannel.sh "${{ inputs.flannelVersion }}"

    - name: Skip CNI installation (bring your own CNI)
      if: ${{ inputs.disableDefaultCni == 'true' && inputs.cniPlugin == 'none' && inputs.dryRun != 'true' }}
      shell: bash
      run: |
        echo "Skipping Calico CNI installation - installCalico is set to false"
        echo "   You must install your own CNI (e.g., Multus, OVN, Cilium) for the cluster to be functional"

    - name: Install sample network policies
      if: ${{ inputs.installSampleNetworkPolicies == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/install-sample-network-policies.sh

    - name: Setup local Docker registry
      if: ${{ inputs.installLocalRegistry == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        LOCAL_REGISTRY_PORT: ${{ inputs.localRegistryPort }}
        CLUSTER_PROVIDER: ${{ inputs.clusterProvider }}
        CLUSTER_NAME: ${{ inputs.clusterName }}
      run: ${{ github.action_path }}/scripts/setup-local-registry.sh "$LOCAL_REGISTRY_PORT" "$CLUSTER_PROVIDER" "$CLUSTER_NAME"

    - name: Install OLM
      if: ${{ inputs.installOLM == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
      run: ${{ github.action_path }}/scripts/install-olm.sh ${{ inputs.olmVersion }}

    - name: Install Istio
      if: ${{ inputs.installIstio == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
        ISTIO_VERSION: ${{ inputs.istioVersion }}
        ISTIO_PROFILE: ${{ inputs.istioProfile }}
      run: ${{ github.action_path }}/scripts/install-istio.sh "$ISTIO_VERSION" "$ISTIO_PROFILE"

    - name: Install cert-manager
      if: ${{ inputs.installCertManager == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
        CERT_MANAGER_VERSION: ${{ inputs.certManagerVersion }}
      run: ${{ github.action_path }}/scripts/install-cert-manager.sh "$CERT_MANAGER_VERSION"

    - name: Install ingress-nginx
      if: ${{ inputs.installIngressNginx == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
        INGRESS_NGINX_VERSION: ${{ inputs.ingressNginxVersion }}
        CLUSTER_PROVIDER: ${{ inputs.clusterProvider }}
      run: ${{ github.action_path }}/scripts/install-ingress-nginx.sh "$INGRESS_NGINX_VERSION" "$CLUSTER_PROVIDER"

    - name: Install metrics-server
      if: ${{ inputs.installMetricsServer == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
        METRICS_SERVER_VERSION: ${{ inputs.metricsServerVersion }}
      run: ${{ github.action_path }}/scripts/install-metrics-server.sh "$METRICS_SERVER_VERSION"

    - name: Install MetalLB
      if: ${{ inputs.installMetalLB == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
      run: ${{ github.action_path }}/scripts/install-metallb.sh ${{ inputs.metalLBVersion }} ${{ inputs.clusterProvider }}

    - name: Install operator-sdk
      if: ${{ inputs.installOperatorSdk == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        OPERATOR_SDK_VERSION: ${{ inputs.operatorSdkVersion }}
      run: ${{ github.action_path }}/scripts/install-operator-sdk.sh "$OPERATOR_SDK_VERSION"

    - name: Install Prometheus monitoring stack
      if: ${{ inputs.enableClusterMonitoring == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
        KUBE_PROMETHEUS_VERSION: ${{ inputs.kubePrometheusVersion }}
      run: ${{ github.action_path }}/scripts/install-prometheus.sh "$KUBE_PROMETHEUS_VERSION"

    - name: Install Thanos
      if: ${{ inputs.enableClusterMonitoring == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        COMPONENT_TIMEOUT: ${{ inputs.componentTimeout }}
        THANOS_VERSION: ${{ inputs.thanosVersion }}
      run: ${{ github.action_path }}/scripts/install-thanos.sh "$THANOS_VERSION"

    - name: Print monitoring access instructions
      if: ${{ (inputs.installMetricsServer == 'true' || inputs.enableClusterMonitoring == 'true') && inputs.dryRun != 'true' }}
      shell: bash
      env:
        INSTALL_METRICS_SERVER: ${{ inputs.installMetricsServer }}
        ENABLE_CLUSTER_MONITORING: ${{ inputs.enableClusterMonitoring }}
      run: ${{ github.action_path }}/scripts/print-monitoring-info.sh "$INSTALL_METRICS_SERVER" "$ENABLE_CLUSTER_MONITORING"

    - name: Remove the default storage class
      if: ${{ inputs.removeDefaultStorageClass == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      run: |
        kubectl delete storageclass standard --ignore-not-found

    - name: Create persistent volumes
      if: ${{ inputs.createPersistentVolumes == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/create-persistent-volumes.sh "${{ inputs.persistentVolumeCount }}" "${{ inputs.persistentVolumeSize }}"

    - name: Remove the control plane taint
      if: ${{ inputs.removeControlPlaneTaint == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      run: |
        ${{ github.action_path }}/scripts/remove-control-plane-taint.sh

    - name: Wait for all pods to be ready
      if: ${{ inputs.waitForPodsReady == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      env:
        WAIT_NAMESPACES: ${{ inputs.waitForPodsNamespaces }}
        EXCLUDE_NAMESPACES: ${{ inputs.waitForPodsExcludeNamespaces }}
        WAIT_TIMEOUT: ${{ inputs.waitForPodsTimeout }}
      run: ${{ github.action_path }}/scripts/wait-for-pods.sh

    - name: Clean up package manager cache
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      run: |
        sudo apt-get clean

    - name: Print timing summary
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      run: |
        # shellcheck source=scripts/log-timing.sh
        source "${{ github.action_path }}/scripts/log-timing.sh"
        print_timing_summary

    - name: Print cluster deployment summary
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      env:
        CLUSTER_PROVIDER: ${{ inputs.clusterProvider }}
        CLUSTER_NAME: ${{ inputs.clusterName }}
        NUM_CONTROL_PLANE_NODES: ${{ inputs.numControlPlaneNodes }}
        NUM_WORKER_NODES: ${{ inputs.numWorkerNodes }}
        IP_FAMILY: ${{ inputs.ipFamily }}
        INSTALL_CALICO: ${{ inputs.installCalico }}
        CALICO_VERSION: ${{ inputs.calicoVersion }}
        INSTALL_ISTIO: ${{ inputs.installIstio }}
        ISTIO_VERSION: ${{ inputs.istioVersion }}
        ISTIO_PROFILE: ${{ inputs.istioProfile }}
        INSTALL_OLM: ${{ inputs.installOLM }}
        INSTALL_CERT_MANAGER: ${{ inputs.installCertManager }}
        CERT_MANAGER_VERSION: ${{ inputs.certManagerVersion }}
        INSTALL_INGRESS_NGINX: ${{ inputs.installIngressNginx }}
        INGRESS_NGINX_VERSION: ${{ inputs.ingressNginxVersion }}
        INSTALL_METRICS_SERVER: ${{ inputs.installMetricsServer }}
        METRICS_SERVER_VERSION: ${{ inputs.metricsServerVersion }}
        INSTALL_OPERATOR_SDK: ${{ inputs.installOperatorSdk }}
        OPERATOR_SDK_VERSION: ${{ inputs.operatorSdkVersion }}
        ENABLE_CLUSTER_MONITORING: ${{ inputs.enableClusterMonitoring }}
        INSTALL_SAMPLE_NETWORK_POLICIES: ${{ inputs.installSampleNetworkPolicies }}
        INSTALL_LOCAL_REGISTRY: ${{ inputs.installLocalRegistry }}
        LOCAL_REGISTRY_PORT: ${{ inputs.localRegistryPort }}
        ENABLE_CLEANUP: ${{ inputs.enableCleanup }}
      run: |
        K8S_VERSION=$(kubectl version -o json 2>/dev/null | jq -r '.serverVersion.gitVersion' 2>/dev/null) || K8S_VERSION="unknown"
        echo ""
        echo "======================================"
        echo "  Quick-K8s Deployment Summary"
        echo "======================================"
        echo ""
        echo "Provider:     $CLUSTER_PROVIDER"
        echo "Cluster:      $CLUSTER_NAME"
        echo "K8s Version:  ${K8S_VERSION}"
        echo "CP Nodes:     $NUM_CONTROL_PLANE_NODES"
        echo "Worker Nodes: $NUM_WORKER_NODES"
        echo "IP Family:    $IP_FAMILY"
        echo ""
        echo "Components:"
        if [ "$INSTALL_CALICO" = "true" ]; then echo "  - Calico CNI $CALICO_VERSION"; fi
        if [ "$INSTALL_ISTIO" = "true" ]; then echo "  - Istio $ISTIO_VERSION ($ISTIO_PROFILE)"; fi
        if [ "$INSTALL_OLM" = "true" ]; then echo "  - OLM"; fi
        if [ "$INSTALL_CERT_MANAGER" = "true" ]; then echo "  - cert-manager $CERT_MANAGER_VERSION"; fi
        if [ "$INSTALL_INGRESS_NGINX" = "true" ]; then echo "  - ingress-nginx $INGRESS_NGINX_VERSION"; fi
        if [ "$INSTALL_METRICS_SERVER" = "true" ]; then echo "  - metrics-server $METRICS_SERVER_VERSION"; fi
        if [ "$INSTALL_OPERATOR_SDK" = "true" ]; then echo "  - operator-sdk $OPERATOR_SDK_VERSION"; fi
        if [ "$ENABLE_CLUSTER_MONITORING" = "true" ]; then echo "  - Prometheus/Thanos monitoring"; fi
        if [ "$INSTALL_SAMPLE_NETWORK_POLICIES" = "true" ]; then echo "  - Sample network policies"; fi
        if [ "$INSTALL_LOCAL_REGISTRY" = "true" ]; then echo "  - Local registry @ localhost:$LOCAL_REGISTRY_PORT"; fi
        echo ""
        echo "Connection Details:"
        KUBECONFIG_PATH="${KUBECONFIG:-$HOME/.kube/config}"
        echo "  Kubeconfig:  $KUBECONFIG_PATH"
        API_SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null) || API_SERVER="unavailable"
        echo "  API Server:  $API_SERVER"
        CONTEXT=$(kubectl config current-context 2>/dev/null) || CONTEXT="unavailable"
        echo "  Context:     $CONTEXT"
        if [ "$INSTALL_LOCAL_REGISTRY" = "true" ]; then
          echo "  Registry:    localhost:$LOCAL_REGISTRY_PORT"
        fi
        if [ "$ENABLE_CLEANUP" = "true" ]; then
          echo "  Cleanup:     /tmp/quick-k8s-cleanup.sh"
        fi
        echo ""
        kubectl get nodes 2>/dev/null || true
        echo ""
        echo "======================================"

        # Write deployment summary to GitHub Step Summary
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          COMPONENTS=""
          if [ "$INSTALL_CALICO" = "true" ]; then COMPONENTS="${COMPONENTS}Calico CNI $CALICO_VERSION, "; fi
          if [ "$INSTALL_ISTIO" = "true" ]; then COMPONENTS="${COMPONENTS}Istio $ISTIO_VERSION ($ISTIO_PROFILE), "; fi
          if [ "$INSTALL_OLM" = "true" ]; then COMPONENTS="${COMPONENTS}OLM, "; fi
          if [ "$INSTALL_CERT_MANAGER" = "true" ]; then COMPONENTS="${COMPONENTS}cert-manager $CERT_MANAGER_VERSION, "; fi
          if [ "$INSTALL_INGRESS_NGINX" = "true" ]; then COMPONENTS="${COMPONENTS}ingress-nginx $INGRESS_NGINX_VERSION, "; fi
          if [ "$INSTALL_METRICS_SERVER" = "true" ]; then COMPONENTS="${COMPONENTS}metrics-server $METRICS_SERVER_VERSION, "; fi
          if [ "$INSTALL_OPERATOR_SDK" = "true" ]; then COMPONENTS="${COMPONENTS}operator-sdk $OPERATOR_SDK_VERSION, "; fi
          if [ "$ENABLE_CLUSTER_MONITORING" = "true" ]; then COMPONENTS="${COMPONENTS}Prometheus/Thanos monitoring, "; fi
          if [ "$INSTALL_SAMPLE_NETWORK_POLICIES" = "true" ]; then COMPONENTS="${COMPONENTS}Sample network policies, "; fi
          if [ "$INSTALL_LOCAL_REGISTRY" = "true" ]; then COMPONENTS="${COMPONENTS}Local registry (localhost:$LOCAL_REGISTRY_PORT), "; fi
          # Remove trailing comma and space
          COMPONENTS="${COMPONENTS%, }"
          if [ -z "$COMPONENTS" ]; then COMPONENTS="None"; fi

          {
            echo "## Cluster Deployment Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Provider | $CLUSTER_PROVIDER |"
            echo "| Cluster Name | $CLUSTER_NAME |"
            echo "| Control Plane Nodes | $NUM_CONTROL_PLANE_NODES |"
            echo "| Worker Nodes | $NUM_WORKER_NODES |"
            echo "| IP Family | $IP_FAMILY |"
            echo "| Components | ${COMPONENTS} |"
            echo "| Kubeconfig | \`~/.kube/config\` |"
            echo ""
            echo "<details>"
            echo "<summary>Cluster Nodes</summary>"
            echo ""
            echo "\`\`\`"
            kubectl get nodes 2>/dev/null || echo "Unable to retrieve node information"
            echo "\`\`\`"
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Generate cleanup script
      if: ${{ inputs.enableCleanup == 'true' && inputs.dryRun != 'true' }}
      shell: bash
      run: |
        cp "${{ github.action_path }}/scripts/cleanup-cluster.sh" /tmp/quick-k8s-cleanup.sh
        chmod +x /tmp/quick-k8s-cleanup.sh

    - name: Remove temporary files
      if: ${{ inputs.dryRun != 'true' }}
      shell: bash
      run: |
        rm -f ${{ github.action_path }}/kind-config.yaml || true
        rm -f oc.tar.gz kind || true
