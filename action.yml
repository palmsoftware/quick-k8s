name: 'Quick K8s'
description: 'Quickly deploy a k8s cluster on Github Actions hosted runners'
branding:
  icon: 'box'
  color: 'blue'
inputs:
  apiServerPort:
    description: 'The port to use for the Kubernetes API server'
    required: false
    default: '6443'
  apiServerAddress:
    description: 'The address to use for the Kubernetes API server'
    required: false
    default: '0.0.0.0'
  disableDefaultCni:
    description: 'Disable the default CNI plugin'
    required: false
    default: 'true'
  ipFamily:
    description: 'The IP family to use for the Kubernetes API server'
    required: false
    default: 'dual'
  defaultNodeImage:
    description: 'The default node image to use for the Kubernetes cluster'
    required: false
    default: 'kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5'
  numControlPlaneNodes:
    description: 'The number of control plane nodes to use for the Kubernetes cluster'
    required: false
    default: '1'
  numWorkerNodes:
    description: 'The number of worker nodes to use for the Kubernetes cluster'
    required: false
    default: '1'
  clusterName:
    description: 'Name for the Kubernetes cluster'
    required: false
    default: 'kind'
  clusterProvider:
    description: 'Kubernetes cluster provider (kind or minikube)'
    required: false
    default: 'kind'
  kindVersion:
    description: 'The version of KinD to use'
    required: false
    default: 'v0.32.0'
  minikubeVersion:
    description: 'The version of Minikube to use'
    required: false
    default: 'v1.38.1'
  minikubeDriver:
    description: 'The driver to use for Minikube (docker, podman, none)'
    required: false
    default: 'docker'
  calicoVersion:
    description: 'The version of Calico to use'
    required: false
    default: 'v3.32.1'
  ocpReleaseLevel:
    description: 'The release level of OpenShift to use'
    required: false
    default: '4.22'
  installOLM:
    description: 'Install the Operator Lifecycle Manager'
    required: false
    default: 'false'
  removeDefaultStorageClass:
    description: 'Remove the default storage class'
    required: false
    default: 'false'
  removeControlPlaneTaint:
    description: 'Remove the control plane taint'
    required: false
    default: 'false'
  waitForPodsReady:
    description: 'Wait for all pods to be ready'
    required: false
    default: 'false'
  installIstio:
    description: 'Install Istio service mesh'
    required: false
    default: 'false'
  istioVersion:
    description: 'The version of Istio to install'
    required: false
    default: '1.30.2'
  istioProfile:
    description: 'Istio installation profile (minimal, demo, default, preview, ambient, empty)'
    required: false
    default: 'minimal'
  installCertManager:
    description: 'Install cert-manager for TLS certificate management'
    required: false
    default: 'false'
  certManagerVersion:
    description: 'The version of cert-manager to install'
    required: false
    default: 'v1.20.3'
  installIngressNginx:
    description: 'Install NGINX Ingress controller for HTTP/HTTPS routing'
    required: false
    default: 'false'
  ingressNginxVersion:
    description: 'The version of ingress-nginx to install'
    required: false
    default: 'v1.15.1'
  installMetricsServer:
    description: 'Install metrics-server for kubectl top and HPA support'
    required: false
    default: 'false'
  metricsServerVersion:
    description: 'The version of metrics-server to install'
    required: false
    default: 'v0.8.1'
  workerNodeLabels:
    description: 'Comma-separated list of key=value labels to apply to worker nodes (e.g., "node-role.kubernetes.io/worker=worker,env=test")'
    required: false
    default: ''
  installOperatorSdk:
    description: 'Install operator-sdk CLI for building and testing Kubernetes operators'
    required: false
    default: 'false'
  operatorSdkVersion:
    description: 'The version of operator-sdk to install'
    required: false
    default: 'v1.42.3'
  enableClusterMonitoring:
    description: 'Enable cluster monitoring stack (Prometheus, Thanos, Alertmanager, Grafana) via kube-prometheus'
    required: false
    default: 'false'
  kubePrometheusVersion:
    description: 'The version of kube-prometheus to install'
    required: false
    default: 'v0.18.0'
  thanosVersion:
    description: 'The version of Thanos to install'
    required: false
    default: 'v0.41.0'
  installCalico:
    description: 'Install Calico CNI when default CNI is disabled. Set to false to bring your own CNI (e.g., Multus, OVN)'
    required: false
    default: 'true'
  kindConfigPath:
    description: 'Path to custom KinD configuration file. When provided, uses this instead of auto-generated config'
    required: false
    default: ''
  installLocalRegistry:
    description: 'Install a local Docker registry accessible from the cluster'
    required: false
    default: 'false'
  localRegistryPort:
    description: 'Port for the local Docker registry'
    required: false
    default: '5001'

runs:
  using: 'composite'
  steps:
    - name: Validate cluster provider input
      shell: bash
      run: |
        if [[ "${{ inputs.clusterProvider }}" != "kind" && "${{ inputs.clusterProvider }}" != "minikube" ]]; then
          echo "Invalid cluster provider: ${{ inputs.clusterProvider }}"
          echo "Must be 'kind' or 'minikube'"
          exit 1
        fi

    - name: Validate IP family input
      shell: bash
      run: |
        if [[ "${{ inputs.ipFamily }}" != "dual" && "${{ inputs.ipFamily }}" != "ipv4" && "${{ inputs.ipFamily }}" != "ipv6" ]]; then
          echo "Invalid IP family: ${{ inputs.ipFamily }}"
          echo "Must be 'dual', 'ipv4', or 'ipv6'"
          exit 1
        fi

    - name: Warn about ipFamily support for non-KinD providers
      if: ${{ inputs.clusterProvider != 'kind' && inputs.ipFamily != 'ipv4' }}
      shell: bash
      run: |
        echo "::warning::ipFamily '${{ inputs.ipFamily }}' is only fully supported with KinD. ${{ inputs.clusterProvider }} will use default networking (ipv4)."

    - name: Validate API server address input
      shell: bash
      run: |
        if ! python3 -c "import ipaddress; ipaddress.ip_address('${{ inputs.apiServerAddress }}')" 2>/dev/null; then
          echo "::error::Invalid API server address: ${{ inputs.apiServerAddress }}"
          echo "Must be a valid IPv4 or IPv6 address"
          exit 1
        fi

    - name: Validate KinD version input
      if: ${{ inputs.clusterProvider == 'kind' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "KinD" "kubernetes-sigs/kind" "${{ inputs.kindVersion }}"

    - name: Validate Minikube version input
      if: ${{ inputs.clusterProvider == 'minikube' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "Minikube" "kubernetes/minikube" "${{ inputs.minikubeVersion }}"

    - name: Validate Calico version input
      if: ${{ inputs.installCalico != 'false' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "Calico" "projectcalico/calico" "${{ inputs.calicoVersion }}"

    - name: Validate OpenShift release level input
      shell: bash
      run: |
        if ! [[ "${{ inputs.ocpReleaseLevel }}" =~ ^[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid OpenShift release level format: ${{ inputs.ocpReleaseLevel }}"
          exit 1
        fi

    - name: Validate Istio version input
      if: ${{ inputs.installIstio == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "Istio" "istio/istio" "${{ inputs.istioVersion }}"

    - name: Validate Istio profile input
      if: ${{ inputs.installIstio == 'true' }}
      shell: bash
      run: |
        VALID_PROFILES=("minimal" "demo" "default" "preview" "ambient" "empty")
        PROFILE="${{ inputs.istioProfile }}"
        if [[ ! " ${VALID_PROFILES[@]} " =~ " ${PROFILE} " ]]; then
          echo "Invalid Istio profile: $PROFILE"
          echo "Valid profiles are: ${VALID_PROFILES[*]}"
          exit 1
        fi

    - name: Validate installCertManager input
      shell: bash
      run: |
        if [[ "${{ inputs.installCertManager }}" != "true" && "${{ inputs.installCertManager }}" != "false" ]]; then
          echo "Invalid installCertManager value: ${{ inputs.installCertManager }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate cert-manager version input
      if: ${{ inputs.installCertManager == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "cert-manager" "cert-manager/cert-manager" "${{ inputs.certManagerVersion }}"

    - name: Validate installIngressNginx input
      shell: bash
      run: |
        if [[ "${{ inputs.installIngressNginx }}" != "true" && "${{ inputs.installIngressNginx }}" != "false" ]]; then
          echo "Invalid installIngressNginx value: ${{ inputs.installIngressNginx }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate ingress-nginx version input
      if: ${{ inputs.installIngressNginx == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "ingress-nginx" "kubernetes/ingress-nginx" "${{ inputs.ingressNginxVersion }}" "controller-"

    - name: Validate installMetricsServer input
      shell: bash
      run: |
        if [[ "${{ inputs.installMetricsServer }}" != "true" && "${{ inputs.installMetricsServer }}" != "false" ]]; then
          echo "Invalid installMetricsServer value: ${{ inputs.installMetricsServer }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate metrics-server version input
      if: ${{ inputs.installMetricsServer == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "metrics-server" "kubernetes-sigs/metrics-server" "${{ inputs.metricsServerVersion }}"

    - name: Validate installOperatorSdk input
      shell: bash
      run: |
        if [[ "${{ inputs.installOperatorSdk }}" != "true" && "${{ inputs.installOperatorSdk }}" != "false" ]]; then
          echo "Invalid installOperatorSdk value: ${{ inputs.installOperatorSdk }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate operator-sdk version input
      if: ${{ inputs.installOperatorSdk == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "operator-sdk" "operator-framework/operator-sdk" "${{ inputs.operatorSdkVersion }}"

    - name: Validate enableClusterMonitoring input
      shell: bash
      run: |
        if [[ "${{ inputs.enableClusterMonitoring }}" != "true" && "${{ inputs.enableClusterMonitoring }}" != "false" ]]; then
          echo "Invalid enableClusterMonitoring value: ${{ inputs.enableClusterMonitoring }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate kube-prometheus version input
      if: ${{ inputs.enableClusterMonitoring == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "kube-prometheus" "prometheus-operator/kube-prometheus" "${{ inputs.kubePrometheusVersion }}"

    - name: Validate Thanos version input
      if: ${{ inputs.enableClusterMonitoring == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/validate-github-version.sh "Thanos" "thanos-io/thanos" "${{ inputs.thanosVersion }}"

    - name: Validate installCalico input
      shell: bash
      run: |
        if [[ "${{ inputs.installCalico }}" != "true" && "${{ inputs.installCalico }}" != "false" ]]; then
          echo "Invalid installCalico value: ${{ inputs.installCalico }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate installLocalRegistry input
      shell: bash
      run: |
        if [[ "${{ inputs.installLocalRegistry }}" != "true" && "${{ inputs.installLocalRegistry }}" != "false" ]]; then
          echo "Invalid installLocalRegistry value: ${{ inputs.installLocalRegistry }}"
          echo "Must be 'true' or 'false'"
          exit 1
        fi

    - name: Validate localRegistryPort input
      if: ${{ inputs.installLocalRegistry == 'true' }}
      shell: bash
      run: |
        PORT="${{ inputs.localRegistryPort }}"
        if ! [[ "$PORT" =~ ^[0-9]+$ ]] || [ "$PORT" -lt 1024 ] || [ "$PORT" -gt 65535 ]; then
          echo "Invalid localRegistryPort: $PORT"
          echo "Must be a number between 1024 and 65535"
          exit 1
        fi

    - name: Validate kindConfigPath input
      if: ${{ inputs.kindConfigPath != '' && inputs.clusterProvider == 'kind' }}
      shell: bash
      run: |
        CONFIG_PATH="${{ inputs.kindConfigPath }}"
        if [ ! -f "$CONFIG_PATH" ]; then
          echo "Custom KinD config file not found: $CONFIG_PATH"
          exit 1
        fi
        echo "Using custom KinD configuration from: $CONFIG_PATH"

    - name: Validate number of control-plane nodes
      shell: bash
      run: |
        if [[ "${{ inputs.numControlPlaneNodes }}" -lt 1 ]]; then
          echo "The number of control-plane nodes cannot be less than 1."
          exit 1
        fi

    - name: Validate number of worker nodes
      shell: bash
      run: |
        if [[ "${{ inputs.numWorkerNodes }}" -lt 0 ]]; then
          echo "The number of worker nodes cannot be negative."
          exit 1
        fi

    - name: Check GitHub service status
      shell: bash
      run: ${{ github.action_path }}/scripts/check-github-status.sh

    - name: Write temporary docker file (Linux)
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        mkdir -p /home/runner/.docker
        touch /home/runner/.docker/config

    - name: Optimize disk space and relocate Docker storage (Linux)
      if: ${{ runner.os == 'Linux' }}
      uses: palmsoftware/quick-cleanup@v0
      with:
        cleanup-mode: auto
        minimum-free-space: 8

    - name: Setup Docker on Mac
      if: ${{ runner.os == 'macOS' }}
      uses: douglascamata/setup-docker-macos-action@v1.1.0

    # Cache KinD binary to avoid download failures during outages
    - name: Cache KinD binary
      if: ${{ inputs.clusterProvider == 'kind' }}
      id: cache-kind
      uses: actions/cache@v6
      with:
        path: /tmp/kind-binary
        key: kind-${{ inputs.kindVersion }}-${{ runner.os }}-${{ runner.arch }}

    # Install KinD binary (unified script for all platforms)
    - name: Install KinD
      if: ${{ inputs.clusterProvider == 'kind' }}
      shell: bash
      run: |
        OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
        ${{ github.action_path }}/scripts/install-kind.sh ${{ inputs.kindVersion }} "$OS" ${{ runner.arch }}

    - name: Add error handling for KinD installation
      if: ${{ inputs.clusterProvider == 'kind' }}
      shell: bash
      run: |
        if ! command -v kind &> /dev/null; then
          echo "KinD installation failed. Exiting."
          exit 1
        fi

    # Cache Minikube binary to avoid download failures during outages
    - name: Cache Minikube binary
      if: ${{ inputs.clusterProvider == 'minikube' }}
      id: cache-minikube
      uses: actions/cache@v6
      with:
        path: /tmp/minikube-binary
        key: minikube-${{ inputs.minikubeVersion }}-${{ runner.os }}-${{ runner.arch }}

    # Install Minikube binary (unified script for all platforms)
    - name: Install Minikube
      if: ${{ inputs.clusterProvider == 'minikube' }}
      shell: bash
      run: |
        OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
        ${{ github.action_path }}/scripts/install-minikube.sh ${{ inputs.minikubeVersion }} "$OS" ${{ runner.arch }}

    - name: Add error handling for Minikube installation
      if: ${{ inputs.clusterProvider == 'minikube' }}
      shell: bash
      run: |
        if ! command -v minikube &> /dev/null; then
          echo "Minikube installation failed. Exiting."
          exit 1
        fi

    # Create a new Kubernetes cluster using KinD
    - name: Populate temporary config file for KinD (auto-generated)
      if: ${{ inputs.clusterProvider == 'kind' && inputs.kindConfigPath == '' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/generate-kind-config.sh ${{ inputs.apiServerPort }} ${{ inputs.apiServerAddress }} ${{ inputs.disableDefaultCni }} ${{ inputs.ipFamily }} ${{ inputs.defaultNodeImage }} ${{ inputs.numControlPlaneNodes }} ${{ inputs.numWorkerNodes }} ${{ github.action_path }}/kind-config.yaml ${{ inputs.clusterName }}

    - name: Use custom KinD config file
      if: ${{ inputs.clusterProvider == 'kind' && inputs.kindConfigPath != '' }}
      shell: bash
      run: |
        echo "Using custom KinD configuration from: ${{ inputs.kindConfigPath }}"
        cp "${{ inputs.kindConfigPath }}" "${{ github.action_path }}/kind-config.yaml"

    - name: Print the KinD config
      if: ${{ inputs.clusterProvider == 'kind' }}
      shell: bash
      run: cat ${{ github.action_path }}/kind-config.yaml

    - name: Configure Docker for Kubernetes (Linux)
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/bootstrap-docker.sh

    - name: Final pre-cluster disk optimization
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/pre-cluster-optimization.sh

    - name: Pre-pull Kind node image with retry
      if: ${{ inputs.clusterProvider == 'kind' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/pull-kind-image.sh "${{ inputs.defaultNodeImage }}"

    - name: Create a new Kubernetes cluster using KinD
      if: ${{ inputs.clusterProvider == 'kind' }}
      shell: bash
      run: |
        if command -v timeout >/dev/null 2>&1; then
          timeout 600 kind create cluster --name ${{ inputs.clusterName }} --config ${{ github.action_path }}/kind-config.yaml
        else
          kind create cluster --name ${{ inputs.clusterName }} --config ${{ github.action_path }}/kind-config.yaml
        fi

    - name: Create a new Kubernetes cluster using Minikube
      if: ${{ inputs.clusterProvider == 'minikube' }}
      shell: bash
      run: |
        ${{ github.action_path }}/scripts/start-minikube.sh \
          "${{ inputs.defaultNodeImage }}" \
          "${{ inputs.disableDefaultCni }}" \
          "${{ inputs.minikubeDriver }}" \
          "${{ inputs.apiServerPort }}" \
          "${{ inputs.numControlPlaneNodes }}" \
          "${{ inputs.numWorkerNodes }}" \
          "${{ inputs.apiServerAddress }}" \
          "${{ inputs.clusterName }}"

    # - name: Bootstrap the runner with kubectl and oc clients
    - name: Bootstrap the runner with kubectl and oc clients
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo ${{ github.action_path }}/scripts/install-oc-tools.sh --latest ${{ inputs.ocpReleaseLevel }}

    - name: Install oc client on MacOS
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        brew install openshift-cli
        brew install kubernetes-cli

    - name: Apply labels to worker nodes
      if: ${{ inputs.workerNodeLabels != '' && inputs.numWorkerNodes > 0 }}
      shell: bash
      run: ${{ github.action_path }}/scripts/label-worker-nodes.sh ${{ inputs.numWorkerNodes }} "${{ inputs.workerNodeLabels }}"

    - name: Install calico CNI if default CNI is disabled and installCalico is true
      if: ${{ inputs.disableDefaultCni == 'true' && inputs.installCalico == 'true' }}
      shell: bash
      run: |
        echo "Installing Calico CNI version $CALICO_VERSION..."
        CALICO_URL="https://raw.githubusercontent.com/projectcalico/calico/$CALICO_VERSION/manifests/calico.yaml"
        max_attempts=3
        attempt=1
        delay=5
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt/$max_attempts: Applying Calico manifest..."
          output=$(oc apply --timeout=5m -f "$CALICO_URL" 2>&1) && {
            echo "$output"
            echo "Calico CNI installed successfully"
            break
          }
          exit_code=$?
          echo "$output"
          # Calico v3.32+ includes CRDs using CEL functions (e.g. isCIDR) not available
          # in K8s < 1.31. The core CNI components still install correctly, so treat
          # CRD validation errors as non-fatal if the calico-node daemonset exists.
          if echo "$output" | grep -q "is invalid:.*compilation failed"; then
            if oc get daemonset calico-node -n kube-system &>/dev/null; then
              echo "Warning: Some Calico CRDs failed validation (likely K8s version incompatibility) but core components installed successfully"
              break
            fi
          fi
          if [ $attempt -eq $max_attempts ]; then
            echo "Calico installation failed after $max_attempts attempts"
            exit $exit_code
          fi
          echo "Retrying in $delay seconds..."
          sleep $delay
          delay=$((delay * 2))
          attempt=$((attempt + 1))
        done
      env:
        CALICO_VERSION: ${{ inputs.calicoVersion }}

    - name: Skip CNI installation (bring your own CNI)
      if: ${{ inputs.disableDefaultCni == 'true' && inputs.installCalico == 'false' }}
      shell: bash
      run: |
        echo "⚠️  Skipping Calico CNI installation - installCalico is set to false"
        echo "   You must install your own CNI (e.g., Multus, OVN, Cilium) for the cluster to be functional"

    - name: Setup local Docker registry
      if: ${{ inputs.installLocalRegistry == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/setup-local-registry.sh ${{ inputs.localRegistryPort }} ${{ inputs.clusterProvider }} ${{ inputs.clusterName }}

    - name: Install OLM
      if: ${{ inputs.installOLM == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/install-olm.sh

    - name: Install Istio
      if: ${{ inputs.installIstio == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/install-istio.sh ${{ inputs.istioVersion }} ${{ inputs.istioProfile }}

    - name: Install cert-manager
      if: ${{ inputs.installCertManager == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/install-cert-manager.sh ${{ inputs.certManagerVersion }}

    - name: Install ingress-nginx
      if: ${{ inputs.installIngressNginx == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/install-ingress-nginx.sh ${{ inputs.ingressNginxVersion }} ${{ inputs.clusterProvider }}

    - name: Install metrics-server
      if: ${{ inputs.installMetricsServer == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/install-metrics-server.sh ${{ inputs.metricsServerVersion }}

    - name: Install operator-sdk
      if: ${{ inputs.installOperatorSdk == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/install-operator-sdk.sh ${{ inputs.operatorSdkVersion }}

    - name: Install Prometheus monitoring stack
      if: ${{ inputs.enableClusterMonitoring == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/install-prometheus.sh ${{ inputs.kubePrometheusVersion }}

    - name: Install Thanos
      if: ${{ inputs.enableClusterMonitoring == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/install-thanos.sh ${{ inputs.thanosVersion }}

    - name: Remove the default storage class
      if: ${{ inputs.removeDefaultStorageClass == 'true' }}
      shell: bash
      run: |
        oc delete storageclass standard --ignore-not-found

    - name: Remove the control plane taint
      if: ${{ inputs.removeControlPlaneTaint == 'true' }}
      shell: bash
      run: |
        ${{ github.action_path }}/scripts/remove-control-plane-taint.sh

    - name: Wait for all pods to be ready
      if: ${{ inputs.waitForPodsReady == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/wait-for-pods.sh

    - name: Clean up package manager cache (Linux)
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo apt-get clean

    - name: Clean up Homebrew cache (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        brew cleanup -s
        rm -rf ~/Library/Caches/Homebrew

    - name: Print cluster deployment summary
      shell: bash
      run: |
        echo ""
        echo "======================================"
        echo "  Quick-K8s Deployment Summary"
        echo "======================================"
        echo ""
        echo "Provider:     ${{ inputs.clusterProvider }}"
        echo "Cluster:      ${{ inputs.clusterName }}"
        echo "CP Nodes:     ${{ inputs.numControlPlaneNodes }}"
        echo "Worker Nodes: ${{ inputs.numWorkerNodes }}"
        echo "IP Family:    ${{ inputs.ipFamily }}"
        echo ""
        echo "Components:"
        if [ "${{ inputs.installCalico }}" = "true" ]; then echo "  - Calico CNI ${{ inputs.calicoVersion }}"; fi
        if [ "${{ inputs.installIstio }}" = "true" ]; then echo "  - Istio ${{ inputs.istioVersion }} (${{ inputs.istioProfile }})"; fi
        if [ "${{ inputs.installOLM }}" = "true" ]; then echo "  - OLM"; fi
        if [ "${{ inputs.installCertManager }}" = "true" ]; then echo "  - cert-manager ${{ inputs.certManagerVersion }}"; fi
        if [ "${{ inputs.installIngressNginx }}" = "true" ]; then echo "  - ingress-nginx ${{ inputs.ingressNginxVersion }}"; fi
        if [ "${{ inputs.installMetricsServer }}" = "true" ]; then echo "  - metrics-server ${{ inputs.metricsServerVersion }}"; fi
        if [ "${{ inputs.installOperatorSdk }}" = "true" ]; then echo "  - operator-sdk ${{ inputs.operatorSdkVersion }}"; fi
        if [ "${{ inputs.enableClusterMonitoring }}" = "true" ]; then echo "  - Prometheus/Thanos monitoring"; fi
        if [ "${{ inputs.installLocalRegistry }}" = "true" ]; then echo "  - Local registry @ localhost:${{ inputs.localRegistryPort }}"; fi
        echo ""
        echo "Kubeconfig: ~/.kube/config"
        echo ""
        kubectl get nodes 2>/dev/null || true
        echo ""
        echo "======================================"

    - name: Remove temporary files
      shell: bash
      run: |
        rm -f ${{ github.action_path }}/kind-config.yaml || true
        rm -f oc.tar.gz kind || true
