---
name: Nightly Comprehensive Tests

on:
  schedule:
    - cron: '0 0 * * *'  # Run at midnight UTC daily
  # pull_request:
  #   branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  # Basic cluster tests with different providers and OS versions
  basic-cluster-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, ubuntu-24.04, ubuntu-24.04-arm, ubuntu-26.04]
        provider: [kind, minikube]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run the action with ${{ matrix.provider }}
        uses: ./
        with:
          clusterProvider: ${{ matrix.provider }}
          disableDefaultCni: true
          waitForPodsReady: true

      - name: Verify cluster is operational
        run: |
          kubectl get nodes
          kubectl get pods -A
          kubectl cluster-info

  # Multi-node cluster tests
  multi-node-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        provider: [kind, minikube]
        nodes:
          - controlPlane: 1
            workers: 2
          - controlPlane: 1
            workers: 3
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with multiple nodes
        uses: ./
        with:
          clusterProvider: ${{ matrix.provider }}
          numControlPlaneNodes: ${{ matrix.nodes.controlPlane }}
          numWorkerNodes: ${{ matrix.nodes.workers }}
          disableDefaultCni: true
          waitForPodsReady: true

      - name: Verify node count
        run: |
          NODE_COUNT=$(kubectl get nodes --no-headers | wc -l)
          EXPECTED_COUNT=$((${{ matrix.nodes.controlPlane }} + ${{ matrix.nodes.workers }}))
          if [ "$NODE_COUNT" -ne "$EXPECTED_COUNT" ]; then
            echo "Expected $EXPECTED_COUNT nodes, found $NODE_COUNT"
            exit 1
          fi
          kubectl get nodes

  # OLM installation tests
  olm-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        provider: [kind, minikube]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with OLM
        uses: ./
        with:
          clusterProvider: ${{ matrix.provider }}
          installOLM: true
          waitForPodsReady: true

      - name: Verify OLM installation
        run: |
          kubectl get crds | grep operators.coreos.com
          kubectl get pods -n olm
          kubectl get catalogsource -n olm

  # Istio installation tests
  istio-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        provider: [kind, minikube]
        istio-profile: [minimal, demo, default]
        exclude:
          - provider: minikube
            istio-profile: demo
          - provider: minikube
            istio-profile: default
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with Istio
        uses: ./
        with:
          clusterProvider: ${{ matrix.provider }}
          installIstio: true
          istioProfile: ${{ matrix.istio-profile }}
          waitForPodsReady: true

      - name: Verify Istio installation
        run: |
          kubectl get namespace istio-system
          kubectl get pods -n istio-system
          istioctl version
          # Verify Istio installation by checking if pods are running
          kubectl wait --for=condition=ready pod --all -n istio-system --timeout=300s

  # Combined features tests (OLM + Istio)
  combined-features-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        provider: [kind, minikube]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with all features
        uses: ./
        with:
          clusterProvider: ${{ matrix.provider }}
          installOLM: true
          installIstio: true
          istioProfile: minimal
          removeDefaultStorageClass: true
          removeControlPlaneTaint: true
          waitForPodsReady: true

      - name: Verify all features
        run: |
          echo "=== Cluster Info ==="
          kubectl get nodes
          kubectl get pods -A

          echo "=== OLM Verification ==="
          kubectl get crds | grep operators.coreos.com
          kubectl get pods -n olm

          echo "=== Istio Verification ==="
          kubectl get pods -n istio-system
          istioctl version

          echo "=== Storage Class Verification ==="
          kubectl get storageclass

  # Cluster monitoring tests (Prometheus + Thanos)
  monitoring-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        provider: [kind, minikube]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with cluster monitoring
        uses: ./
        with:
          clusterProvider: ${{ matrix.provider }}
          enableClusterMonitoring: true
          waitForPodsReady: true

      - name: Verify monitoring stack
        run: |
          echo "=== Monitoring Namespace ==="
          kubectl get namespace monitoring

          echo "=== Prometheus Verification ==="
          kubectl get pods -n monitoring
          kubectl get prometheus -n monitoring
          kubectl get alertmanager -n monitoring
          kubectl get crd | grep monitoring.coreos.com

          echo "=== Thanos Verification ==="
          kubectl get pods -n monitoring -l app.kubernetes.io/name=thanos-query
          kubectl get pods -n monitoring -l app.kubernetes.io/name=prometheus -o jsonpath='{.items[*].spec.containers[*].name}' | tr ' ' '\n' | grep thanos

  # Component installation tests across OS matrix
  cert-manager-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with cert-manager
        uses: ./
        with:
          clusterProvider: kind
          installCertManager: true
          waitForPodsReady: true

      - name: Verify cert-manager
        run: |
          kubectl get namespace cert-manager
          kubectl wait --for=condition=ready pod --all -n cert-manager --timeout=60s
          kubectl get crd | grep cert-manager

  ingress-nginx-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with ingress-nginx
        uses: ./
        with:
          clusterProvider: kind
          installIngressNginx: true
          waitForPodsReady: true

      - name: Verify ingress-nginx
        run: |
          kubectl get namespace ingress-nginx
          kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=60s
          kubectl get ingressclass

  metrics-server-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with metrics-server
        uses: ./
        with:
          clusterProvider: kind
          installMetricsServer: true
          waitForPodsReady: true

      - name: Verify metrics-server
        run: |
          kubectl get pods -n kube-system -l k8s-app=metrics-server
          sleep 30
          kubectl top nodes || echo "Metrics may need more time to populate"

  operator-sdk-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with operator-sdk
        uses: ./
        with:
          clusterProvider: kind
          installOperatorSdk: true
          waitForPodsReady: true

      - name: Verify operator-sdk
        run: operator-sdk version

  local-registry-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with local registry
        uses: ./
        with:
          clusterProvider: kind
          installLocalRegistry: true
          localRegistryPort: 5001
          waitForPodsReady: true

      - name: Verify local registry
        run: |
          docker ps | grep quick-k8s-registry
          curl -s http://localhost:5001/v2/ || exit 1
          docker pull busybox:latest
          docker tag busybox:latest localhost:5001/test-image:latest
          docker push localhost:5001/test-image:latest

  # Different Kubernetes versions test (KinD only as it supports explicit versions easily)
  kubernetes-versions-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        k8s-version:
          - 'kindest/node:v1.31.0@sha256:25a3504b2b340954595fa7a6ed1575ef2edadf5abd83c0776a4308b64bf47c93'
          - 'kindest/node:v1.30.0@sha256:047357ac0cfea04663786a612ba1eaba9702bef25227a794b52890dd8bcd692e'
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with specific K8s version
        uses: ./
        with:
          clusterProvider: kind
          defaultNodeImage: ${{ matrix.k8s-version }}
          waitForPodsReady: true

      - name: Verify Kubernetes version
        run: |
          kubectl version
          kubectl get nodes -o wide

  # Minikube driver tests
  minikube-driver-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        driver: [docker]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with Minikube driver
        uses: ./
        with:
          clusterProvider: minikube
          minikubeDriver: ${{ matrix.driver }}
          waitForPodsReady: true

      - name: Verify Minikube driver
        run: |
          minikube profile list
          kubectl get nodes

  # IP family tests
  ip-family-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        provider: [kind]
        ip-family: [dual, ipv4]
    runs-on: ${{ matrix.os }}
    env:
      SHELL: /bin/bash
    steps:
      - name: Checkout the code
        uses: actions/checkout@v7

      - name: Run action with IP family
        uses: ./
        with:
          clusterProvider: ${{ matrix.provider }}
          ipFamily: ${{ matrix.ip-family }}
          waitForPodsReady: true

      - name: Verify IP configuration
        run: |
          kubectl get nodes -o wide
          kubectl get pods -A -o wide

