name: Version Updates Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      component:
        description: 'Run for a specific component (leave empty for all)'
        required: false
        type: choice
        options:
          - all
          - calico
          - kind
          - minikube
          - istio
          - cert-manager
          - ingress-nginx
          - metrics-server
          - operator-sdk
          - kube-prometheus
          - thanos

permissions: read-all

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - component: Calico
            repo: projectcalico/calico
            field: calicoVersion
            tag_prefix: ''
            version_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
          - component: KinD
            repo: kubernetes-sigs/kind
            field: kindVersion
            tag_prefix: ''
            version_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
          - component: Minikube
            repo: kubernetes/minikube
            field: minikubeVersion
            tag_prefix: ''
            version_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
          - component: Istio
            repo: istio/istio
            field: istioVersion
            tag_prefix: ''
            version_regex: '^[0-9]+\.[0-9]+\.[0-9]+$'
          - component: cert-manager
            repo: cert-manager/cert-manager
            field: certManagerVersion
            tag_prefix: ''
            version_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
          - component: ingress-nginx
            repo: kubernetes/ingress-nginx
            field: ingressNginxVersion
            tag_prefix: 'controller-'
            version_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
          - component: metrics-server
            repo: kubernetes-sigs/metrics-server
            field: metricsServerVersion
            tag_prefix: ''
            version_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
          - component: operator-sdk
            repo: operator-framework/operator-sdk
            field: operatorSdkVersion
            tag_prefix: ''
            version_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
          - component: kube-prometheus
            repo: prometheus-operator/kube-prometheus
            field: kubePrometheusVersion
            tag_prefix: ''
            version_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
          - component: Thanos
            repo: thanos-io/thanos
            field: thanosVersion
            tag_prefix: ''
            version_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
    steps:
      - name: Check if this component should run
        id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.component }}" = "all" ] || [ "${{ inputs.component }}" = "${{ matrix.component }}" ] || [ "${{ inputs.component }}" = "$(echo '${{ matrix.component }}' | tr '[:upper:]' '[:lower:]')" ]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v7

      - name: Get latest release version
        if: steps.should_run.outputs.run == 'true'
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          get_version() {
            local retries=3
            local delay=5

            for ((i=1; i<=retries; i++)); do
              echo "Attempt $i to fetch ${{ matrix.component }} version..."

              response=$(curl -s --max-time 30 -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ matrix.repo }}/releases/latest")

              if [ $? -eq 0 ] && [ -n "$response" ]; then
                tag=$(echo "$response" | jq -r '.tag_name // empty')

                if [ -n "$tag" ] && [ "$tag" != "null" ]; then
                  version="${tag#${{ matrix.tag_prefix }}}"

                  if [[ "$version" =~ ${{ matrix.version_regex }} ]]; then
                    echo "Successfully fetched ${{ matrix.component }} version: $version"
                    echo "version=$version" >> $GITHUB_OUTPUT
                    return 0
                  else
                    echo "Invalid version format: '$version' (tag: '$tag')"
                  fi
                else
                  echo "No tag_name in response"
                fi
              else
                echo "API call failed or returned empty response"
              fi

              if [ $i -lt $retries ]; then
                echo "Retrying in $delay seconds..."
                sleep $delay
              fi
            done

            echo "Failed to fetch valid ${{ matrix.component }} version after $retries attempts"
            exit 1
          }

          get_version

      - name: Update version in action.yml
        if: steps.should_run.outputs.run == 'true'
        id: update_version
        run: |
          version=${{ steps.get_version.outputs.version }}

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Error: Invalid ${{ matrix.component }} version '$version' - aborting update"
            exit 1
          fi

          echo "Updating ${{ matrix.component }} version to: $version"

          current_version=$(sed -n "/^  ${{ matrix.field }}:$/,/^  [a-zA-Z]\+:/p" action.yml | grep -o "default: '[^']*'" | sed "s/default: '\(.*\)'/\1/")

          if [ -z "$current_version" ]; then
            echo "Could not determine current ${{ matrix.component }} version from action.yml"
            exit 1
          fi

          if [ "$current_version" = "$version" ]; then
            echo "${{ matrix.component }} version is already up to date ($version)"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          sed -i.bak -E "/^  ${{ matrix.field }}:$/,/^  [a-zA-Z]+:/{s/(default: ')[^']+(')/\1$version\2/}" action.yml
          rm action.yml.bak

          echo "Successfully updated ${{ matrix.component }} version from $current_version to $version"
          echo "updated=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.should_run.outputs.run == 'true' && steps.update_version.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "Update ${{ matrix.component }} version to ${{ steps.get_version.outputs.version }}"
          title: "Update ${{ matrix.component }} version to ${{ steps.get_version.outputs.version }}"
          body: "Automated PR to update default ${{ matrix.field }} in action.yml to the latest release."
          branch: "update-${{ matrix.field }}-${{ steps.get_version.outputs.version }}"
          delete-branch: true
