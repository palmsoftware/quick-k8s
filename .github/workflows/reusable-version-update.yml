name: Reusable Version Update

on:
  workflow_call:
    inputs:
      component_name:
        description: 'Display name of the component (e.g., Calico)'
        required: true
        type: string
      github_repo:
        description: 'GitHub repo path (e.g., projectcalico/calico)'
        required: true
        type: string
      action_yml_field:
        description: 'The input field name in action.yml (e.g., calicoVersion)'
        required: true
        type: string
      tag_prefix:
        description: 'Tag prefix to strip (e.g., controller- for ingress-nginx)'
        required: false
        type: string
        default: ''
      version_regex:
        description: 'Regex to validate the version (default: semver with v prefix)'
        required: false
        type: string
        default: '^v[0-9]+\.[0-9]+\.[0-9]+$'
    secrets:
      PAT_TOKEN:
        required: true

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get latest release version
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          get_version() {
            local retries=3
            local delay=5

            for ((i=1; i<=retries; i++)); do
              echo "Attempt $i to fetch ${{ inputs.component_name }} version..."

              response=$(curl -s --max-time 30 -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ inputs.github_repo }}/releases/latest")

              if [ $? -eq 0 ] && [ -n "$response" ]; then
                tag=$(echo "$response" | jq -r '.tag_name // empty')

                if [ -n "$tag" ] && [ "$tag" != "null" ]; then
                  version="${tag#${{ inputs.tag_prefix }}}"

                  if [[ "$version" =~ ${{ inputs.version_regex }} ]]; then
                    echo "Successfully fetched ${{ inputs.component_name }} version: $version"
                    echo "version=$version" >> $GITHUB_OUTPUT
                    return 0
                  else
                    echo "Invalid version format: '$version' (tag: '$tag')"
                  fi
                else
                  echo "No tag_name in response"
                fi
              else
                echo "API call failed or returned empty response"
              fi

              if [ $i -lt $retries ]; then
                echo "Retrying in $delay seconds..."
                sleep $delay
              fi
            done

            echo "Failed to fetch valid ${{ inputs.component_name }} version after $retries attempts"
            exit 1
          }

          get_version

      - name: Update version in action.yml
        id: update_version
        run: |
          version=${{ steps.get_version.outputs.version }}

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Error: Invalid ${{ inputs.component_name }} version '$version' - aborting update"
            exit 1
          fi

          echo "Updating ${{ inputs.component_name }} version to: $version"

          current_version=$(sed -n "/^  ${{ inputs.action_yml_field }}:$/,/^  [a-zA-Z]\+:/p" action.yml | grep -o "default: '[^']*'" | sed "s/default: '\(.*\)'/\1/")

          if [ -z "$current_version" ]; then
            echo "Could not determine current ${{ inputs.component_name }} version from action.yml"
            exit 1
          fi

          if [ "$current_version" = "$version" ]; then
            echo "${{ inputs.component_name }} version is already up to date ($version)"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          sed -i.bak -E "/^  ${{ inputs.action_yml_field }}:$/,/^  [a-zA-Z]+:/{s/(default: ')[^']+(')/\1$version\2/}" action.yml
          rm action.yml.bak

          echo "Successfully updated ${{ inputs.component_name }} version from $current_version to $version"
          echo "updated=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.update_version.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "Update ${{ inputs.component_name }} version to ${{ steps.get_version.outputs.version }}"
          title: "Update ${{ inputs.component_name }} version to ${{ steps.get_version.outputs.version }}"
          body: "Automated PR to update default ${{ inputs.action_yml_field }} in action.yml to the latest release."
          branch: "update-${{ inputs.action_yml_field }}-${{ steps.get_version.outputs.version }}"
          delete-branch: true
